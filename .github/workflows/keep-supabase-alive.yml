name: Keep Supabase Alive

on:
  schedule:
    # 每天 UTC 时间 00:00 运行（北京时间 08:00）
    - cron: '0 0 * * *'
  workflow_dispatch: # 允许手动触发

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Ping Supabase
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
        run: bun run scripts/keep-supabase-alive.mjs

      - name: Report Status
        if: success()
        run: echo "✅ Supabase 保活成功 - $(date)"

      - name: Report Failure
        if: failure()
        run: |
          echo "❌ Supabase 保活失败 - $(date)"
          echo "请检查 Supabase 项目状态和环境变量配置"
          exit 1
