name = "acuitybookmarks"
main = "src/index.ts"
compatibility_date = "2024-10-01"
workers_dev = true

# ===================== 可观测性配置 =====================
# 用于监控 Worker 的运行状况、性能和错误
[observability]
enabled = true
head_sampling_rate = 1  # 采样率：1 = 100%（开发阶段），生产环境可降低到 0.1

# 日志配置
[observability.logs]
enabled = true
head_sampling_rate = 1
persist = true           # 持久化存储日志
invocation_logs = true   # 记录每次调用的详细信息

# 追踪配置
[observability.traces]
enabled = true
persist = true
head_sampling_rate = 1   # 追踪所有请求（生产环境可降低）

# 注意：Custom Domain 不支持路径/通配符，且本地开发无需 routes。
# 为避免 wrangler dev 校验失败，将自定义域名路由仅放在 production 环境里。

# 共享配置（所有环境）
[vars]
# Gumroad 配置（需要填入实际值）
GUMROAD_PLAN_ID_MONTHLY = "o7qLAIuwtSQWZjaFr2EabQ%3D%3D&_gl=1*8l61ck*_ga*MTM3NDU3NDY4OS4xNzYyNzg1NzA3*_ga_6LJN6D94N6*czE3NjI4NDQ4MTYkbzMkZzEkdDE3NjI4NDQ5NDMkajYwJGwwJGgw"
GUMROAD_PLAN_ID_YEARLY = ""
# GUMROAD_WEBHOOK_SECRET = ""  # 可选，如果 Gumroad 提供 Secret

# Supabase 配置（这些是公开配置，敏感信息使用 Secrets）
SUPABASE_URL = "https://ugxgxytykxblctsyulsg.supabase.co"

[ai]
binding = "AI"

[[vectorize]]
binding = "VECTORIZE" # available in Worker as env.VECTORIZE
index_name = "bookmarks-index-m3" # 1024-dim index for @cf/baai/bge-m3

# Production 环境配置
[env.production]
routes = [
  { pattern = "api.acuitybookmarks.com", custom_domain = true }
]

# Production 环境的可观测性配置（更保守的采样率）
[env.production.observability]
enabled = true
head_sampling_rate = 0.1  # 生产环境采样 10%，降低成本

[env.production.observability.logs]
enabled = true
head_sampling_rate = 0.1  # 记录 10% 的日志
persist = true
invocation_logs = true

[env.production.observability.traces]
enabled = true
persist = true
head_sampling_rate = 0.1  # 追踪 10% 的请求

[env.production.vars]
# Production 环境变量（继承顶层 vars，可覆盖）
GUMROAD_PLAN_ID_MONTHLY = "o7qLAIuwtSQWZjaFr2EabQ%3D%3D&_gl=1*8l61ck*_ga*MTM3NDU3NDY4OS4xNzYyNzg1NzA3*_ga_6LJN6D94N6*czE3NjI4NDQ4MTYkbzMkZzEkdDE3NjI4NDQ5NDMkajYwJGwwJGgw"
GUMROAD_PLAN_ID_YEARLY = ""
SUPABASE_URL = "https://ugxgxytykxblctsyulsg.supabase.co"

[env.production.ai]
binding = "AI"

[[env.production.vectorize]]
binding = "VECTORIZE"
index_name = "bookmarks-index-m3"


# ===================== 环境变量建议（部署前请在 Dashboard/Secrets 配置） =====================
# JWT_SECRET = "<high-entropy-production-secret>"
# SUPABASE_SERVICE_ROLE_KEY = "<service-role-key>"  # Supabase Service Role Key（⚠️ 保密，只在后端使用）
# AUTH_GOOGLE_CLIENT_ID = "<optional>"            # Google OAuth 客户端 ID
# AUTH_GOOGLE_CLIENT_SECRET = "<optional>"        # Google OAuth 客户端 Secret
# AUTH_MICROSOFT_CLIENT_ID = "<optional>"         # Microsoft Azure 客户端 ID
# AUTH_MICROSOFT_CLIENT_SECRET = "<optional>"     # Microsoft Azure 客户端 Secret
# AUTH_APPLE_CLIENT_ID = "<optional>"             # Apple Sign In 客户端 ID
# AUTH_APPLE_CLIENT_SECRET = "<optional>"         # Apple Sign In 客户端 Secret
# GUMROAD_ACCESS_TOKEN = "<optional>"             # Gumroad API Access Token（用于必要的查询，可选）
# GUMROAD_WEBHOOK_SECRET = "<optional>"           # Gumroad Webhook 签名 Secret
# GUMROAD_PRODUCT_ID = "<optional>"               # Gumroad 产品 ID（非必填，仅用于记录）

# 推荐域名规划（已采用）：
# - API: api.acuitybookmarks.com （本文件 routes 已设置）
# - App: app.acuitybookmarks.com （前端承载重置/设置等页面）
